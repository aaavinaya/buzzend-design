<!DOCTYPE html>
<html lang="en" data-theme="light" data-palette="teal" data-font="nunito">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Buzzend · Challenge Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800;900&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/tokens.css" />
  <link rel="stylesheet" href="../../css/palettes.css" />
  <link rel="stylesheet" href="../../css/fonts.css" />
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../../css/screens/home.css" />
  <link rel="stylesheet" href="../../css/screens/challenges.css" />
  <link rel="stylesheet" href="../../css/screens/challenge-detail.css" />
</head>
<body>
  <div class="state-switch">
    <button data-v="1" onclick="setV('1')">Classic</button>
    <button data-v="3" onclick="setV('3')">Immersive</button>
    <button data-v="5" onclick="setV('5')">Card</button>
    <button data-v="6" onclick="setV('6')">Compact</button>
    <button data-v="7" onclick="setV('7')">Poster</button>
  </div>
  <button class="theme-toggle" onclick="toggleTheme(); CDetail.render()" style="top:64px">🌙</button>

  <div class="screen-box">
    <div class="screen">
      <div class="statusbar" id="sb" style="position:absolute;top:0;left:0;right:0;z-index:30;height:44px"><span>9:41</span><span>5G&nbsp;&nbsp;·&nbsp;&nbsp;100%</span></div>
      <div class="cd" id="app"></div>
    </div>
  </div>

  <script src="../../js/components/dialog.js"></script>
  <script src="../../js/components/icons.js"></script>
  <script src="../../js/screens/social-data.js"></script>
  <script src="../../js/screens/challenge-detail.js"></script>
  <script src="../../js/app.js"></script>
  <script>
    const _p = new URLSearchParams(location.search);
    const app = document.getElementById("app"), sb = document.getElementById("sb");
    function setV(v) {
      CDetail.start(app, v, _p.get("role") || "viewer", _p.get("tab"));
      sb.style.color = "#fff";
      document.querySelectorAll(".state-switch button").forEach(b => b.classList.toggle("active", b.dataset.v === v));
    }
    setV(_p.get("v") || "1");
  </script>
</body>
</html>
